version: '3.8'

services:
  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 lms.wsgi:application
    restart: always
    env_file:
      - .env
    volumes:
      - static_volume:/app/static
    expose:
      - 8000

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
    depends_on:
      - web

volumes:
  static_volume: